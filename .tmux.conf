# ~/.tmux.conf: Terminal multiplexer configuration

# Use 256 colors
set -g default-terminal "screen-256color"

# Enable extended keys for modified Enter/Ctrl+Enter/etc.
set -g extended-keys on

# Remap prefix from Ctrl+b to Ctrl+a (like GNU screen)
set -g prefix C-a
# Bind 'C-a C-a' to send 'C-a' to the terminal
bind C-a send-prefix
# Unbind the original prefix
unbind C-b

# Increase scrollback history
set -g history-limit 10000

# Start window and pane numbering at 1 for easier keyboard navigation
set -g base-index 1
setw -g pane-base-index 1

# Reload tmux config with r
bind r source-file ~/.tmux.conf \; display "Reloaded tmux configuration!"

# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Quick pane switching with Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Enable mouse mode (works in tmux 2.1 and above)
set -g mouse on

# Toggle mouse on/off with prefix + M (useful for apps that need native scrolling)
bind M set -g mouse

# Smoother scrolling in copy mode
bind -T copy-mode WheelUpPane send -N 5 -X scroll-up
bind -T copy-mode WheelDownPane send -N 5 -X scroll-down

# Don't rename windows automatically
set-option -g allow-rename off

# Local config, if any
if-shell "[ -f ~/.tmux.conf.local ]" 'source ~/.tmux.conf.local'
